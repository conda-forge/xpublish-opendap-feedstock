{% set name = "xpublish-opendap" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xpublish_opendap-{{ version }}.tar.gz
  sha256: 26677c5dd38415bae4d076cfbc92de59b9979d84d6f9fad1bdf86653f5435841

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - opendap-protocol <1.2.0
    - xarray
    - xpublish <0.4.0,>=0.3.0

test:
  imports:
    - xpublish_opendap
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/xpublish-community/xpublish-opendap/
  summary: OpenDAP endpoint plugin for Xpublish
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - abkfenris
